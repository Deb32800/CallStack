<title>CallStack — Live Call</title>
<link rel="stylesheet" href="dashboard.css" />

<div id="app">
  <header id="status-bar" class="card">
    <div id="status-left">
      <div id="pulse" class="pulse listening">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div>
        <div id="status-text">Connecting…</div>
        <div id="status-sub">—</div>
      </div>
    </div>
    <div id="timer">00:00</div>
  </header>

  <main>
    <section id="transcript-panel" class="card">
      <h3>Live transcript</h3>
      <div id="transcript"></div>
    </section>
    <aside id="reasoning-panel" class="card">
      <h3>Reasoning</h3>
      <div id="reasoning-log"></div>
    </aside>
  </main>

  <footer id="instruction-bar" class="card">
    <input id="instruction-input" type="text" placeholder="Type a live instruction and press Enter…" />
  </footer>

  <div id="result-card" hidden>
    <button id="result-close" aria-label="Dismiss">×</button>
    <div id="result-head">
      <span id="result-icon">✓</span>
      <h2 id="result-title"></h2>
    </div>
    <p id="result-summary"></p>
    <div id="result-meta"></div>
  </div>
</div>

<script src="dashboard.js"></script>
